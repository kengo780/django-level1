{% extends "base.html" %}

{% block title%}{{title}}{% endblock %}

{% block content %}
<div class="container">
    <h2 class="m-2 mb-4 p-2 bg-primary text-white">{{title}}</h2>
    <!-- URLの名前から送信先のURLを作る -->
    <form action="{% url 'chapter08:work07' %}" method="POST" novalidate>
        <!-- フォームの項目を<p>タグでまとめて表示する -->
        {{form.as_p}}
        {% csrf_token %}
        <button type="submit" class="my-2 btn btn-primary">送信</button>
    </form>
    <hr>
    <!-- 「request.method」が「"POST"」と等しい場合は、入力された値を表示する -->
    {% if request.method == "POST" %}
    <div>名前：{{ form.name.value }}</div>
    <div>隠し属性：{{ form.secret.value }}</div>
    {% endif %}
</div>
{% endblock %}
